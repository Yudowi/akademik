<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Akademik HSUQI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--font-scale:1.0;--compact:12px;
    --blue-900:#0C447C; --blue-700:#185FA5; --blue-500:#378ADD; --blue-100:#B5D4F4; --blue-50:#E6F1FB;
    --ink:#122033; --muted:#5A6b7b; --hint:#8a97a5;
    --bg:#EEF3F9; --card:#FFFFFF; --line:#E3EAF2;
    --amber-bg:#FAEEDA; --amber-tx:#854F0B; --amber-solid:#EF9F27;
    --green-bg:#E1F5EE; --green-tx:#0F6E56; --green-solid:#37c26f;
    --red-bg:#FCEBEB; --red-tx:#A32D2D; --red-solid:#E24B4A;
    --blue-bg:#E6F1FB; --blue-tx:#185FA5; --blue-solid:#378ADD;
    --gray-bg:#EEF1F5; --gray-tx:#7a8898; --gray-solid:#c7cfd8;
    --wa:#25D366; --wa-dark:#128C7E;
    --chip-bg:#EEF1F5; --chip-tx:#7a8898;
    --shadow:0 6px 22px rgba(18,40,80,.10);
    --nav-h:64px; --side-w:248px; --top-h:64px;
  }
  html[data-theme="dark"]{
    --blue-50:#15263A; --blue-100:#1E3A57;
    --ink:#E7EEF6; --muted:#9FB0C2; --hint:#6E8093;
    --bg:#0E1621; --card:#16212E; --line:#273544;
    --amber-bg:#3A2E17; --amber-tx:#E7B667;
    --green-bg:#123027; --green-tx:#5FD3A5;
    --red-bg:#3A1E1E; --red-tx:#F0908E;
    --blue-bg:#15263A; --blue-tx:#69A8EA;
    --gray-bg:#1E2A38; --gray-tx:#8FA0B2;
    --chip-bg:#1E2A38; --chip-tx:#9FB0C2;
    --shadow:0 6px 22px rgba(0,0,0,.35);
  }
  html[data-theme="dark"] .card, html[data-theme="dark"] .rowitem, html[data-theme="dark"] .slot{background:var(--card)}
  html[data-theme="dark"] body{background:var(--bg)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}
  button,input,textarea,select{font-family:inherit}
  a{color:inherit;text-decoration:none}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#cdd7e3;border-radius:10px}
  ::-webkit-scrollbar-track{background:transparent}

  /* ============ LOGIN ============ */
  .login-wrap{position:fixed;inset:0;background:linear-gradient(150deg,#0C447C 0%,#185FA5 60%,#378ADD 130%);display:flex;align-items:center;justify-content:center;padding:22px;z-index:100;overflow-y:auto}
  .login-cardwrap{width:100%;max-width:400px;margin:auto}
  .login-brand{text-align:center;color:#fff;margin-bottom:22px}
  .login-brand .logo{width:72px;height:72px;border-radius:20px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:36px}
  .login-brand h1{font-size:25px;font-weight:800;letter-spacing:.2px}
  .login-brand p{font-size:13px;opacity:.85;margin-top:4px}
  .login-card{background:#fff;border-radius:22px;padding:26px 22px;box-shadow:0 18px 55px rgba(0,0,0,.3)}
  .login-card h2{font-size:17px;font-weight:700}
  .login-card .lsub{font-size:12.5px;color:var(--muted);margin:4px 0 18px}
  .role-tabs{display:flex;gap:8px;margin-bottom:18px}
  .role-tab{flex:1;border:1.5px solid var(--line);background:var(--card);border-radius:12px;padding:13px 6px;text-align:center;cursor:pointer;transition:.18s}
  .role-tab .nm{font-size:12.5px;font-weight:700;color:var(--muted);letter-spacing:.1px}
  .role-tab.on{border-color:var(--blue-700);background:var(--blue-50);box-shadow:0 3px 10px rgba(24,95,165,.12)}
  .role-tab.on .nm{color:var(--blue-700)}
  .login-brand .logo{width:66px;height:66px;border-radius:19px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;margin:0 auto 15px}
  .login-err{background:var(--red-bg);border:1px solid #F3C7C7;color:var(--red-tx);font-size:12.5px;padding:10px 12px;border-radius:10px;margin-bottom:14px;display:none}
  .login-err.show{display:block}
  .login-demo{margin-top:15px;border-top:1px solid var(--line);padding-top:14px}
  .login-demo .dh{font-size:11.5px;color:var(--hint);text-align:center;margin-bottom:10px}
  .demo-chip{display:flex;align-items:center;gap:10px;width:100%;background:var(--blue-50);border:1px solid var(--blue-100);border-radius:12px;padding:10px 12px;margin-bottom:8px;cursor:pointer;text-align:left}
  .demo-chip:active{transform:scale(.99)}
  .demo-chip .av{width:36px;height:36px;border-radius:50%;background:var(--blue-700);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
  .demo-chip .r{font-size:12.5px;font-weight:700;color:var(--ink)}
  .demo-chip .e{font-size:11px;color:var(--muted)}
  .login-foot{text-align:center;color:#fff;opacity:.8;font-size:11.5px;margin-top:16px}

  /* ============ APP SHELL (RESPONSIVE) ============ */
  .app{display:none;min-height:100vh}
  .app.show{display:block}

  /* Top bar */
  .topbar{position:fixed;top:0;left:0;right:0;height:var(--top-h);background:var(--blue-700);color:#fff;display:flex;align-items:center;gap:12px;padding:0 16px;z-index:50}
  .topbar .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px}
  .topbar .brand .mark{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-size:17px}
  .topbar .ttl{min-width:0}
  .topbar .ttl h1{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar .ttl .s{font-size:11.5px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar .spacer{flex:1}
  .role-badge{font-size:10px;font-weight:800;background:rgba(255,255,255,.2);padding:4px 9px;border-radius:20px;letter-spacing:.4px}
  .icon-btn{background:rgba(255,255,255,.16);border:none;color:#fff;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;flex-shrink:0}
  .icon-btn:active{transform:scale(.95)}
  .notif-dot{position:absolute;top:7px;right:8px;min-width:15px;height:15px;padding:0 3px;border-radius:8px;background:var(--red-solid);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--blue-700)}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--blue-900);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;cursor:pointer;flex-shrink:0}

  /* Sidebar (desktop) */
  .sidebar{position:fixed;top:var(--top-h);left:0;bottom:0;width:var(--side-w);background:var(--card);border-right:1px solid var(--line);padding:14px 12px;overflow-y:auto;z-index:40;display:none}
  .side-link{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;margin-bottom:3px}
  .side-link .ico{color:var(--hint);display:flex}
  .side-link:hover{background:var(--blue-50)}
  .side-link.on{background:var(--blue-700);color:#fff}
  .side-link.on .ico{color:#fff}
  .side-sec{font-size:10.5px;font-weight:800;letter-spacing:.6px;color:var(--hint);text-transform:uppercase;padding:14px 13px 6px}

  /* Content */
  .content{padding:calc(var(--top-h) + 16px) 16px calc(var(--nav-h) + 24px);max-width:640px;margin:0 auto}

  /* Bottom nav (mobile) - TRULY FIXED */
  .bottomnav{position:fixed;left:0;right:0;bottom:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:var(--card);border-top:1px solid var(--line);display:flex;z-index:60;box-shadow:0 -2px 14px rgba(18,40,80,.06)}
  .bottomnav button,.nav-tab{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--hint);font-size:10.5px;font-weight:700;padding:0}
  .bottomnav button .ico{display:flex}
  .bottomnav button.on,.nav-tab.on{color:var(--blue-700);border-bottom:2px solid var(--blue-700)}

  /* DESKTOP LAYOUT */
  @media(min-width:900px){
    :root{--font-scale:1.0;--compact:12px;--top-h:66px}
    .sidebar{display:block}
    .bottomnav{display:none}
    .content{margin-left:var(--side-w);max-width:920px;padding:calc(var(--top-h) + 22px) 30px 40px;margin-right:auto}
    .topbar .brand{width:calc(var(--side-w) - 28px)}
    .fab{display:none!important}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    .desk-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  }
  @media(max-width:899px){
    .brand-full{display:none}
    .desk-only{display:none!important}
  }
  @media(min-width:900px){ .mob-only{display:none!important} }

  /* ============ COMPONENTS ============ */
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;box-shadow:var(--shadow)}
  .card+.card{margin-top:12px}
  .sec-title{font-size:14px;font-weight:700;margin:18px 2px 11px;display:flex;align-items:center;justify-content:between}
  .sec-title .more{margin-left:auto;font-size:12.5px;color:var(--blue-700);font-weight:600;cursor:pointer}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(min-width:900px){.stat-grid{grid-template-columns:repeat(4,1fr)}}
  .stat{border-radius:15px;padding:15px;border:1px solid var(--line);background:var(--card);cursor:pointer}
  .stat .n{font-size:26px;font-weight:800;line-height:1}
  .stat .l{font-size:12px;color:var(--muted);margin-top:7px;font-weight:600}
  .alert-x{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;border:none;background:transparent;color:var(--hint);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
  #app.compact .card{margin-bottom:9px;padding:12px}
  #app.compact .rowitem{padding:8px 0}
  #app.compact .sec-title{margin:12px 0 7px}
  #app.compact .slot{padding:10px 12px}
  html[dir="rtl"] .content, html[dir="rtl"] .card{text-align:right}
  html[dir="rtl"] .topbar .ttl{text-align:right}
  .alert-x:hover{background:var(--gray-bg);color:var(--red-tx)}
  .alert-card{touch-action:pan-y}
  .grad-blue{background:linear-gradient(135deg,#0C447C 0%,#185FA5 55%,#378ADD 115%)!important;box-shadow:0 12px 30px rgba(12,68,124,.32)}
  .grad-hero{background:linear-gradient(135deg,#0C447C 0%,#185FA5 60%,#3A8FE0 120%)!important;box-shadow:0 12px 30px rgba(12,68,124,.30)}
  .topbar{background:linear-gradient(100deg,#0C447C 0%,#185FA5 100%)}
  .stat.hero .l{color:rgba(255,255,255,.9)}

  .pill{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:700;display:inline-block}
  .pill.subj{color:var(--blue-700);background:var(--blue-50)}
  .pill.lvl{color:var(--chip-tx);background:var(--chip-bg)}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block}
  .badge.todo{background:var(--amber-bg);color:var(--amber-tx)}
  .badge.done{background:var(--green-bg);color:var(--green-tx)}
  .badge.late{background:var(--red-bg);color:var(--red-tx)}
  .badge.gray{background:var(--chip-bg);color:var(--chip-tx)}
  .badge.info{background:var(--blue-50);color:var(--blue-700)}

  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap;font-size:12.5px;font-weight:600;padding:8px 15px;border-radius:22px;border:1px solid var(--line);background:var(--card);color:var(--muted);cursor:pointer;flex-shrink:0}
  .chip.on{background:var(--blue-700);color:#fff;border-color:var(--blue-700)}

  .seg{display:flex;background:var(--chip-bg);border-radius:12px;padding:4px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
  .seg::-webkit-scrollbar{display:none}
  .seg button{flex:1;white-space:nowrap;border:none;background:none;font-size:12.5px;font-weight:700;color:var(--muted);padding:9px 12px;border-radius:9px;cursor:pointer}
  .seg button.on{background:var(--card);color:var(--blue-700);box-shadow:0 1px 3px rgba(0,0,0,.09)}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:6px}
  .field input,.field textarea,.field select{width:100%;font-size:13.5px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:var(--card);color:var(--ink);outline:none}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--blue-500)}
  .field textarea{min-height:70px;resize:vertical}

  .btn{width:100%;border:none;padding:13px;border-radius:12px;font-size:14.5px;font-weight:700;cursor:pointer;background:var(--blue-700);color:#fff}
  .btn:active{transform:scale(.99)}
  .btn.ghost{background:transparent;color:var(--blue-700);border:1px solid var(--blue-100)}
  .btn.green{background:var(--green-tx)}
  .btn.red{background:var(--red-tx)}
  .btn.wa{background:var(--wa)}
  .btn.sm{width:auto;padding:9px 14px;font-size:13px;border-radius:10px;display:inline-flex;align-items:center;gap:7px}
  .btn.amber{background:var(--amber-solid)}

  .hint{display:flex;gap:9px;align-items:flex-start;font-size:12px;color:var(--muted);background:var(--blue-50);border-radius:11px;padding:11px 12px;margin-bottom:14px;line-height:1.5}
  .hint .ic{color:var(--blue-700);flex-shrink:0;margin-top:1px;display:flex}
  .hint.amber{background:var(--amber-bg);color:var(--amber-tx)}
  .hint.amber .ic{color:var(--amber-tx)}

  .locked{text-align:center;padding:40px 20px;background:var(--red-bg);border:1px solid #F3C7C7;border-radius:16px;color:var(--red-tx)}
  .locked .em{font-size:38px;margin-bottom:10px}
  .locked .t{font-size:15px;font-weight:800}
  .locked .d{font-size:12.5px;margin-top:6px;opacity:.9}
  .empty{text-align:center;color:var(--hint);font-size:13px;padding:30px 10px}

  .rowitem{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin-bottom:9px}
  .rowitem .av{width:42px;height:42px;border-radius:50%;background:var(--blue-50);color:var(--blue-700);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
  .rowitem .grow{flex:1;min-width:0}
  .rowitem .nm{font-size:14px;font-weight:600}
  .rowitem .sub{font-size:12px;color:var(--muted);margin-top:1px}
  .mini-btn{width:38px;height:38px;border-radius:11px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
  .mini-btn.wa{background:var(--wa);color:#fff}
  .mini-btn.chat{background:var(--blue-50);color:var(--blue-700)}

  .bar{height:9px;border-radius:6px;background:var(--line);overflow:hidden}
  .bar>span{display:block;height:100%;border-radius:6px;background:var(--blue-700)}

  /* FAB */
  .fab{position:fixed;right:16px;bottom:calc(var(--nav-h) + 18px);width:56px;height:56px;border-radius:50%;background:var(--blue-700);color:#fff;border:none;box-shadow:0 8px 22px rgba(24,95,165,.5);cursor:pointer;z-index:55;display:flex;align-items:center;justify-content:center;transition:transform .2s}
  .fab.open{transform:rotate(45deg)}
  .fab-menu{position:fixed;right:18px;bottom:calc(var(--nav-h) + 84px);z-index:56;display:none;flex-direction:column;align-items:flex-end;gap:12px}
  .fab-menu.show{display:flex}
  .fab-menu .item{display:flex;align-items:center;gap:10px;cursor:pointer}
  .fab-menu .item .lbl{background:var(--ink);color:#fff;font-size:12px;font-weight:700;padding:6px 11px;border-radius:8px}
  .fab-menu .item .cir{width:46px;height:46px;border-radius:50%;background:var(--card);color:var(--blue-700);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.2)}

  /* Overlay + sheets/menus */
  .overlay{position:fixed;inset:0;background:rgba(10,20,40,.4);z-index:70;display:none}
  .overlay.show{display:block}
  .menu{position:fixed;top:58px;right:14px;width:262px;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 16px 40px rgba(0,0,0,.24);z-index:80;overflow:hidden;display:none}
  .menu.show{display:block}
  .menu .head{display:flex;gap:11px;align-items:center;padding:15px 14px;border-bottom:1px solid var(--line)}
  .menu .head .av{width:42px;height:42px;border-radius:50%;background:var(--blue-700);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
  .menu .item{display:flex;align-items:center;gap:12px;padding:13px 15px;font-size:13.5px;font-weight:600;cursor:pointer}
  .menu .item .ico{color:var(--blue-700);display:flex}
  .menu .item:hover{background:var(--blue-50)}
  .menu .item.danger{color:var(--red-tx)}
  .menu .item.danger .ico{color:var(--red-tx)}
  .menu .item .ch{margin-left:auto;color:var(--hint)}

  /* Modal */
  .modal{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(10,20,40,.45)}
  .modal.show{display:flex}
  .modal .box{background:var(--card);border-radius:18px;width:100%;max-width:420px;max-height:86vh;overflow-y:auto;padding:18px}
  .modal .box .mh{display:flex;align-items:center;margin-bottom:14px}
  .modal .box .mh .t{font-size:16px;font-weight:700}
  .modal .box .mh .x{margin-left:auto;background:var(--chip-bg);border:none;width:32px;height:32px;border-radius:9px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}

  /* Toast */
  .toast{position:fixed;bottom:calc(var(--nav-h) + 30px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:26px;font-size:13px;font-weight:600;z-index:120;opacity:0;pointer-events:none;transition:.3s;max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(min-width:900px){.toast{bottom:30px}}

  /* Notifications */
  .notif-item{display:flex;gap:12px;padding:13px;border-radius:13px;border:1px solid var(--line);background:var(--card);margin-bottom:9px}
  .notif-item.unread{background:var(--blue-50);border-color:var(--blue-100)}
  .notif-item .nic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .notif-item .nt{font-size:13.5px;font-weight:700}
  .notif-item .nd{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.45}
  .notif-item .nm{font-size:10.5px;color:var(--hint);margin-top:5px}
  .notif-actions{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}

  /* Chat */
  .chat-ava{position:relative;flex-shrink:0}
  .chat-ava .a{width:48px;height:48px;border-radius:50%;background:var(--blue-700);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
  .chat-ava .a.grp{background:var(--blue-900)}
  .chat-ava .a.bc{background:var(--amber-solid)}
  .chat-ava .dot{position:absolute;bottom:1px;right:1px;width:12px;height:12px;border-radius:50%;border:2px solid #fff}
  .chat-ava .dot.on{background:var(--green-solid)}.chat-ava .dot.off{background:#c7cfd8}
  .chat-li{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin-bottom:8px;cursor:pointer}
  .chat-li:active{transform:scale(.995)}
  .chat-li .nm{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
  .chat-li .last{font-size:12px;color:var(--hint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chat-li .meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
  .chat-li .tm{font-size:10.5px;color:var(--hint)}

function splitSec(n){const s=Math.ceil(n/MAX_SANTRI);const b=Math.floor(n/s);const r=n-b*s;const o=[];for(let i=0;i<s;i++)o.push(b+(i<r?1:0));return o;}

let ST = null; // global state
function buildState(){
  // classes
  const classes=[]; let cid=1;
  LEVELS.forEach(L=>{ splitSec(L[2]).forEach((cnt,idx)=>{ classes.push({id:cid++, jenjang:L[0], kelas:L[1]+String.fromCharCode(65+idx), cap:MAX_SANTRI, santri:cnt}); }); });

  const teachers=[];
  teachers.push({id:1, name:'Ustadz Ahmad Fauzi', subj:'Matematika', jenjang:'SMP', wali:'Kelas 7A', wa:'6281200000003', email:'guruhsuqi@gmail.com', tugas:'Wali Kelas', gender:'L'});

  const attend={};

<script>

}
function refreshFullClassNotif(silent){
  if(ROLE==='guru') return;
  // hapus notif kelas-penuh lama
  ST.notifs = ST.notifs.filter(n=>n.type!=='kelaspenuh');
  const full=ST.classes.filter(c=>c.santri>=c.cap);
  full.forEach(c=>{ ST.notifs.unshift({id:ST.notifSeq++,type:'kelaspenuh',ic:'school',color:'amber',title:'Kelas penuh: '+c.kelas,desc:c.kelas+' ('+c.jenjang+') sudah '+c.santri+'/'+c.cap+' santri. Segera buat kelas baru untuk jenjang ini.',when:'info',read:false,done:false}); });

}
function unreadCount(){ return ST.notifs.filter(n=>!n.read && !n.done).length; }
function updateNotifDot(){ const d=document.getElementById('notifDot'); const n=unreadCount(); if(n>0){ d.style.display='flex'; d.textContent=n>9?'9+':n; } else d.style.display='none'; }
function notifRead(id){ const n=ST.notifs.find(x=>x.id==id); if(n) n.read=true; updateNotifDot(); render(); }
function notifDone(id){ const n=ST.notifs.find(x=>x.id==id); if(n){ n.done=true; n.read=true; } updateNotifDot(); render(); showToast('Ditandai selesai ✓'); }
function notifAllRead(){ ST.notifs.forEach(n=>n.read=true); updateNotifDot(); render(); showToast('Semua ditandai dibaca'); }

<script>
/* ================= FILTER STATE ================= */
let F={ ref:'all', kj:'all', kf:'all', mon:'all', gj:'all', dseg:'jenjang', cj:'all', rp:'all', dsDay:TODAY_DAY, sj:'all' };
function setF(k,v){ F[k]=v; render(); }
function setRef(v){F.ref=v;render();} function setKj(v){F.kj=v;render();} function setKf(v){F.kf=v;render();}
function setMon(v){F.mon=v;render();} function setGj(v){F.gj=v;render();} function setCj(v){F.cj=v;render();}
function setRp(v){F.rp=v;render();} function setDsDay(v){F.dsDay=v;render();} function setSj(v){F.sj=v;render();}
function setDseg(v){F.dseg=v;render();}

/* ================= DASHBOARD ================= */
function todaySlots(){ return ST.schedule.filter(s=>s.day===TODAY_DAY); }
function slotStatus(s){
  const a=ST.attend[s.id];
  if(a&&a.status==='confirmed') return {k:'confirmed',at:a.at};
  if(NOW_MIN > timeToMin(s.start)+5) return {k:'late'};
  if(NOW_MIN >= timeToMin(s.start)) return {k:'ongoing'};
  return {k:'upcoming'};
}
function scDashboard(){
  if(ROLE==='owner') return dashOwner();
  if(ROLE==='guru') return dashGuru();
  return dashKoor();
}
/* --- shared widgets --- */
function statCard(n,l,color,go2,hero){ return '<div class="stat'+(hero?' hero':'')+'"'+(go2?' onclick="go(\''+go2+'\')" style="cursor:pointer"':'')+'><div class="n"'+(color&&!hero?' style="color:'+color+'"':'')+'>'+n+'</div><div class="l">'+l+'</div></div>'; }
function quickActions(list){
  let h=h_sec('Aksi cepat');
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  list.forEach(([ic,l,fn])=>{ h+='<div class="card" style="cursor:pointer;display:flex;align-items:center;gap:11px;padding:14px" onclick="'+fn+'"><span style="width:36px;height:36px;border-radius:10px;background:var(--blue-50);color:var(--blue-700);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+icon(ic,19)+'</span><span style="font-size:13px;font-weight:700">'+l+'</span></div>'; });
  h+='</div>'; return h;
}
function actTimeline(n){
  const items=ST.activity.slice(0,n||5);
  let h='<div class="card" style="padding:6px 14px">';
  if(!items.length) h+='<div class="empty">Belum ada aktivitas.</div>';
  items.forEach((a,i)=>{ h+='<div style="display:flex;gap:11px;align-items:flex-start;padding:11px 0'+(i<items.length-1?';border-bottom:1px solid var(--line)':'')+'">'
    +'<span style="width:32px;height:32px;border-radius:9px;background:var(--'+a.color+'-bg);color:var(--'+a.color+'-tx);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+icon(a.ic,16)+'</span>'
    +'<div style="flex:1;min-width:0"><div style="font-size:12.8px;line-height:1.4">'+esc(a.text)+'</div><div style="font-size:10.5px;color:var(--hint);margin-top:2px">'+esc(a.when)+'</div></div></div>'; });
  h+='</div>'; return h;
}
function annPreview(){
  const pinned=ST.announcements.filter(a=>a.pin).concat(ST.announcements.filter(a=>!a.pin)).slice(0,2);
  if(!pinned.length) return '';
  let h=h_sec('Pengumuman','Semua','go(\'pengumuman\')');
  pinned.forEach(a=>{ h+='<div class="card" style="border-left:3px solid var(--blue-500)"><div style="display:flex;align-items:center;gap:7px"><span style="color:var(--blue-700)">'+icon('pin',15)+'</span><b style="font-size:13.5px">'+esc(a.title)+'</b><span class="badge gray" style="margin-left:auto">'+esc(a.date)+'</span></div><div style="font-size:12.5px;color:var(--muted);margin-top:6px;line-height:1.5">'+esc(a.body)+'</div></div>'; });
  return h;
}
function progressCard(label,val,total,color){ const pct=total?Math.round(val/total*100):0; return '<div class="card"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px"><b>'+label+'</b><span style="color:var(--muted)">'+val+'/'+total+' ('+pct+'%)</span></div><div class="bar"><span style="width:'+pct+'%;background:'+(color||'var(--blue-700)')+'"></span></div></div>'; }

/* --- OWNER: monitoring --- */
function dashOwner(){
  const slots=todaySlots(); const conf=slots.filter(s=>slotStatus(s).k==='confirmed').length;
  const totalSantri=ST.classes.reduce((a,c)=>a+c.santri,0);
  const raporAcc=ST.rapor.filter(r=>r.status==='accepted').length;
  const obsDone=ST.observasi.filter(o=>o.tindak==='done').length;
  const refToday=ST.refleksi.filter(r=>r.date===TODAY).length;
  let h=annPreview();
  h+=h_sec('Kondisi lembaga');
  h+='<div class="stat-grid">'
    +statCard(totalSantri,'Total santri',null,'komposisi',true)
    +statCard(ST.teachers.length,'Guru aktif','var(--blue-900)','guru')
    +statCard(ST.classes.length,'Kelas berjalan','var(--blue-700)','komposisi')

  h+=h_sec('Aktivitas terbaru','Semua','go(\'aktivitas\')');
  h+=actTimeline(5);
  return h;
}

/* --- KOORDINATOR: command center --- */
function dashKoor(){
  const slots=todaySlots();
  const conf=slots.filter(s=>slotStatus(s).k==='confirmed').length;
  const late=slots.filter(s=>slotStatus(s).k==='late').length;
  const ongoing=slots.filter(s=>slotStatus(s).k==='ongoing').length;
  const refToday=ST.refleksi.filter(r=>r.date===TODAY);
  const refMissing=ST.teachers.length-new Set(refToday.map(r=>r.guruId)).size;
  const raporPending=ST.rapor.filter(r=>r.status==='submitted').length;
  const fullClass=ST.classes.filter(c=>c.santri>=c.cap).length;

  let h='<div class="card hero-cc grad-hero" style="color:#fff;border:none">'
    +'<div style="font-size:12px;opacity:.85;font-weight:600">Academic Command Center · '+fmtDate(TODAYISO)+'</div>'
    +'<div style="font-size:19px;font-weight:800;margin-top:3px">Kondisi akademik hari ini</div>'
    +'<div style="display:flex;gap:18px;margin-top:14px;flex-wrap:wrap">'
    +'<div><div style="font-size:24px;font-weight:800">'+slots.length+'</div><div style="font-size:11px;opacity:.85">Kelas</div></div>'

    +'<div><div style="font-size:24px;font-weight:800;color:#BFF3DB">'+conf+'</div><div style="font-size:11px;opacity:.85">Hadir</div></div>'
    +'<div><div style="font-size:24px;font-weight:800;color:#FFD3D0">'+late+'</div><div style="font-size:11px;opacity:.85">Telat</div></div>'
    +'</div></div>';
  // alerts (perlu perhatian) — bisa di-dismiss (usap kanan / tombol x)
  h+=h_sec('Perlu perhatian');
  let alerts=[];
  if(late>0) alerts.push(['al_late','clock','red',late+' guru telat konfirmasi (>5 mnt)','Hubungi via WhatsApp','go(\'monitor\')']);
  if(refMissing>0) alerts.push(['al_refl','refleksi','amber',refMissing+' guru belum isi refleksi','Lihat refleksi','go(\'refleksi\')']);
  if(raporPending>0) alerts.push(['al_rapor','grade','blue',raporPending+' rapor menunggu review','Review sekarang','go(\'rapor\')']);
  if(fullClass>0) alerts.push(['al_full','school','amber',fullClass+' kelas penuh — perlu kelas baru','Kelola kelas','go(\'komposisi\')']);
  alerts=alerts.filter(a=>!dismissedAlerts.has(a[0]));
  if(!alerts.length) h+='<div class="card" style="display:flex;gap:10px;align-items:center;color:var(--green-tx)"><span>'+icon('check',20)+'</span><span style="font-size:13px;font-weight:600">Semua kondisi aman. Kerja bagus!</span></div>';
  alerts.forEach(([aid,ic,c,txt,btn,fn])=>{ h+='<div class="card alert-card" data-aid="'+aid+'" ontouchstart="alertTS(event)" ontouchmove="alertTM(event,this)" ontouchend="alertTE(event,this,\''+aid+'\')" style="border-color:var(--'+c+'-solid);display:flex;align-items:center;gap:11px;position:relative">'
    +'<span style="width:38px;height:38px;border-radius:11px;background:var(--'+c+'-bg);color:var(--'+c+'-tx);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+icon(ic,19)+'</span>'
    +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+txt+'</div><div style="font-size:10px;color:var(--hint);margin-top:1px">Usap kanan untuk sembunyikan</div></div>'
    +'<button class="btn sm ghost" style="flex-shrink:0" onclick="'+fn+'">'+btn+'</button>'
    +'<button class="alert-x" onclick="dismissAlert(\''+aid+'\')" title="Sembunyikan">'+icon('close',14)+'</button></div>'; });
  // quick actions
  h+=quickActions([['users','Tambah Guru','formGuru()'],['school','Tambah Kelas','formClass()'],['calendar','Tambah Jadwal','formSchedule()'],['todo','To-Do (Proker)','go(\'todo\')'],['grade','Review Rapor','go(\'rapor\')'],['megaphone','Buat Pengumuman','formPengumuman()']]);

/* --- GURU: hari ini --- */
function dashGuru(){
  const mine=todaySlots().filter(s=>s.guruId===myTeacher().id).sort((a,b)=>timeToMin(a.start)-timeToMin(b.start));
  const myConf=mine.filter(s=>slotStatus(s).k==='confirmed').length;
  const myLate=mine.filter(s=>slotStatus(s).k==='late').length;
  const needRefl=mine.filter(s=>slotStatus(s).k==='confirmed' && !ST.refleksi.some(r=>r.date===TODAY && r.guruId===myTeacher().id && r.kelas===s.kelas)).length;
  const myRaporRev=ST.rapor.filter(r=>r.guruId===myTeacher().id && r.status==='revision').length;
  let h=annPreview();
  h+='<div class="card grad-hero" style="color:#fff;border:none"><div style="font-size:12px;opacity:.85">'+fmtDate(TODAYISO)+'</div><div style="font-size:18px;font-weight:800;margin-top:2px">Hari ini Anda mengajar '+mine.length+' kelas</div><div style="font-size:12.5px;opacity:.9;margin-top:3px">'+myConf+' terkonfirmasi · '+myLate+' belum/telat</div></div>';
  // checklist tugas
  h+=h_sec('Checklist hari ini');
  const chk=[];
  if(myLate>0) chk.push(['clock','red','Konfirmasi '+myLate+' kehadiran yang terlewat','go(\'kehadiran\')']);
  if(needRefl>0) chk.push(['refleksi','amber','Isi refleksi '+needRefl+' kelas yang sudah selesai','go(\'kehadiran\')']);
  if(myRaporRev>0) chk.push(['grade','blue','Perbaiki '+myRaporRev+' rapor yang diminta revisi','go(\'rapor\')']);
  if(!chk.length) chk.push(['check','green','Semua tugas hari ini beres. Barakallah!','go(\'jadwal\')']);
  chk.forEach(([ic,c,txt,fn])=>{ h+='<div class="card" style="display:flex;align-items:center;gap:11px;cursor:pointer" onclick="'+fn+'"><span style="width:36px;height:36px;border-radius:10px;background:var(--'+c+'-bg);color:var(--'+c+'-tx);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+icon(ic,18)+'</span><span style="font-size:13px;font-weight:600;flex:1">'+txt+'</span><span style="color:var(--hint)">'+icon('chevron',18)+'</span></div>'; });
  h+=quickActions([['check','Konfirmasi Hadir','go(\'kehadiran\')'],['refleksi','Isi Refleksi','go(\'tambahRefleksi\')'],['grade','Rapor Saya','go(\'rapor\')'],['folder','Dokumen','go(\'dokumen\')'],['chat','Chat & Grup','go(\'chat\')'],['calendar','Kalender','go(\'kalender\')']]);
  h+=h_sec('Jadwal mengajar hari ini','Semua','go(\'jadwal\')');
  h+= mine.length? mine.map(slotCard).join('') : '<div class="empty">Tidak ada jadwal mengajar hari ini.</div>';

function slotCard(s){
  const st=slotStatus(s); let badge='';
  if(st.k==='confirmed') badge='<span class="badge done">Hadir '+st.at+'</span>';
  else if(st.k==='late') badge='<span class="badge late">Telat konfirmasi</span>';
  else if(st.k==='ongoing') badge='<span class="badge todo">Berlangsung</span>';
  else badge='<span class="badge gray">Akan datang</span>';
  return '<div class="slot'+(st.k==='late'?' late':'')+'"><div class="time">'+s.start+'</div><div class="divider"></div><div class="body">'
    +'<div class="subj">'+esc(s.subj)+'</div><div class="meta">'+esc(s.guru)+' · '+esc(s.kelas)+'</div>'
    +'<div class="tags"><span class="pill lvl">'+s.jenjang+'</span><span class="pill subj">'+esc(s.kelas)+'</span>'+badge+'</div></div></div>';

/* ================= REFLEKSI ================= */
function scRefleksi(){
  const refToday=ST.refleksi.filter(r=>r.date===TODAY);
  const done=new Set(refToday.map(r=>r.guruId));
  let h=h_hint('Ketuk mata pelajaran untuk melihat guru pengampu & refleksinya.');
  h+= SUBJECTS.map(m=>{
    const gurus=ST.teachers.filter(t=>t.subj===m);
    const isi=gurus.filter(t=>done.has(t.id)).length;
    const od=refToday.filter(r=>r.subj===m && r.status==='todo').length;
    return '<div class="rowitem" style="cursor:pointer" onclick="openMapel(\''+m+'\')"><div class="av">'+icon('refleksi',20)+'</div>'
      +'<div class="grow"><div class="nm">'+m+'</div><div class="sub">'+isi+'/'+gurus.length+' guru mengisi'+(od?' · '+od+' perlu tindak lanjut':'')+'</div></div>'
      +'<span style="color:var(--hint)">'+icon('chevron',18)+'</span></div>';
  }).join('');
  return h;
}
function openMapel(m){ curMapel=m; go('refleksiMapel'); }
function scRefleksiMapel(){
  const gurus=ST.teachers.filter(t=>t.subj===curMapel);
  const refToday=ST.refleksi.filter(r=>r.date===TODAY && r.subj===curMapel);

<script>
/* ================= KEHADIRAN ================= */
function scKehadiran(){
  if(ROLE==='guru') return kehadiranGuru();
  return kehadiranKoor();
}
function kehadiranGuru(){
  const mine=todaySlots().filter(s=>s.guruId===myTeacher().id).sort((a,b)=>timeToMin(a.start)-timeToMin(b.start));
  let h=h_hint('Konfirmasi kehadiran mengajar sesuai jadwal Anda. Jika lewat 5 menit dari jam mulai belum konfirmasi, otomatis ditandai <b>telat</b> dan Koordinator dapat menghubungi Anda.','clock');
  if(!mine.length) return h+'<div class="empty">Tidak ada jadwal mengajar hari ini.</div>';
  h+=mine.map(s=>{ const st=slotStatus(s); const done=ST.attend[s.id]&&ST.attend[s.id].done;
    let action='';
    if(st.k==='confirmed'){
      action='<span class="badge done">✓ Hadir '+st.at+'</span>';
      action+=' <button class="btn sm" style="background:#00897B" onclick="window.open(meetLink('+s.id+'),\'_blank\')">'+icon('video',15)+'Masuk Meet</button>';
      if(done) action+=' <span class="badge info">Refleksi terkirim</span>';
      else action+=' <button class="btn sm amber" onclick="selesaiKelas('+s.id+')">'+icon('sparkle',15)+'Selesai kelas & refleksi</button>';
    }
    else action='<button class="btn sm '+(st.k==='late'?'red':'green')+'" onclick="confirmHadir('+s.id+')">'+icon('check',16)+(st.k==='late'?'Konfirmasi (telat)':'Konfirmasi Hadir')+'</button>';
    return '<div class="slot'+(st.k==='late'?' late':'')+'"><div class="time">'+s.start+'</div><div class="divider"></div><div class="body">'
      +'<div class="subj">'+esc(s.subj)+'</div><div class="meta">'+esc(s.kelas)+' · '+s.jenjang+' · '+s.start+'–'+s.end+'</div>'
      +'<div class="tags">'+action+'</div></div></div>';
  }).join('');
  return h;
}
function confirmHadir(sid){
  const s=ST.schedule.find(x=>x.id===sid);
  const late = NOW_MIN > timeToMin(s.start)+5;
  const at=String(Math.floor(NOW_MIN/60)).padStart(2,'0')+'.'+String(NOW_MIN%60).padStart(2,'0');
  ST.attend[sid]={status:'confirmed', at:at, late:late};
  logAct('check', late?'amber':'green', s.guru+' konfirmasi hadir · '+s.subj+' '+s.start+(late?' (telat)':''));
  showToast(late?'Kehadiran dikonfirmasi (tercatat telat)':'Kehadiran dikonfirmasi ✓');
  render();
}
/* workflow: selesai kelas -> wajib refleksi */
function selesaiKelas(sid){
  const s=ST.schedule.find(x=>x.id===sid);
  openModal('Kelas selesai · isi refleksi',
    h_hint('Anda baru menyelesaikan <b>'+esc(s.subj)+' · '+esc(s.kelas)+'</b>. Mohon isi refleksi singkat sebelum menutup — ini otomatis terkirim ke Koordinator.','sparkle')
    +'<div class="field"><label>Materi & capaian</label><textarea id="sk_hasil" placeholder="Materi apa yang tersampaikan?"></textarea></div>'
    +'<div class="field"><label>Kendala</label><textarea id="sk_kendala" placeholder="Adakah kendala?"></textarea></div>'
    +'<label style="display:flex;gap:9px;align-items:center;background:var(--amber-bg);border-radius:10px;padding:11px;margin-bottom:12px;cursor:pointer"><input type="checkbox" id="sk_follow" style="width:17px;height:17px;accent-color:var(--blue-700)"><span style="font-size:12.5px;font-weight:700;color:var(--amber-tx)">Perlu tindak lanjut</span></label>'
    +'<button class="btn green" onclick="submitSelesai('+sid+')">'+icon('send',16)+'Kirim refleksi & selesai</button>');
}
function submitSelesai(sid){
  const s=ST.schedule.find(x=>x.id===sid); const t=myTeacher();
  const follow=document.getElementById('sk_follow').checked;
  ST.refleksi.unshift({id:ST.ridSeq++, guruId:t.id, who:t.name, subj:s.subj, jenjang:s.jenjang, kelas:s.kelas, date:TODAY, status:follow?'todo':'done', hasil:document.getElementById('sk_hasil').value||'-', kendala:document.getElementById('sk_kendala').value||'-', catatan:'-'});
  if(ST.attend[sid]) ST.attend[sid].done=true;
  logAct('refleksi','blue',t.name+' mengisi refleksi · '+s.subj+' '+s.kelas);
  // notif ke koordinator (tersimpan di state; muncul saat login koor)
  closeModal(); showToast('Refleksi terkirim ke Koordinator ✓'); render();
}
function kehadiranKoor(){
  let slots=todaySlots(); if(F.kj!=='all') slots=slots.filter(s=>s.jenjang===F.kj);
  if(F.kf==='confirmed') slots=slots.filter(s=>slotStatus(s).k==='confirmed');
  if(F.kf==='late') slots=slots.filter(s=>slotStatus(s).k==='late');
  slots.sort((a,b)=>timeToMin(a.start)-timeToMin(b.start));
  const all=todaySlots(); const conf=all.filter(s=>slotStatus(s).k==='confirmed').length; const late=all.filter(s=>slotStatus(s).k==='late').length;
  let h='<div class="card"><div style="font-size:14px;font-weight:700">Kehadiran Guru · '+fmtDate(TODAYISO)+'</div>'
    +'<div style="display:flex;gap:16px;margin-top:10px">'
    +'<div><div style="font-size:22px;font-weight:800;color:var(--green-tx)">'+conf+'</div><div style="font-size:11px;color:var(--muted)">Terkonfirmasi</div></div>'
    +'<div><div style="font-size:22px;font-weight:800;color:var(--red-tx)">'+late+'</div><div style="font-size:11px;color:var(--muted)">Telat/belum</div></div>'
    +'<div><div style="font-size:22px;font-weight:800;color:var(--blue-900)">'+all.length+'</div><div style="font-size:11px;color:var(--muted)">Total sesi</div></div>'
    +'</div></div><div style="height:12px"></div>';
  h+=h_chips([['all','Semua'],['SD','SD'],['SMP','SMP'],['SMA','SMA']],F.kj,'setKj');
  h+=h_chips([['all','Semua status'],['confirmed','Hadir'],['late','Telat/Belum']],F.kf,'setKf');
  h+= slots.length? slots.map(s=>koorSlotRow(s)).join('') : '<div class="empty">Tidak ada data.</div>';
  return h;
}
function telGuru(wa){ window.open('tel:+'+wa,'_self'); }
function meetLink(sid){ const s=(ST.schedule||[]).find(x=>x.id===sid)||{jenjang:'x',id:sid}; return 'https://meet.google.com/hsq-'+(''+s.jenjang).toLowerCase()+'-'+s.id; }
function lateBtns(t,ctx){ return '<button class="mini-btn" title="Telepon" style="background:var(--green-tx);color:#fff" onclick="telGuru(\''+t.wa+'\')">'+icon('bell',17)+'</button>'
  +'<button class="mini-btn wa" title="WhatsApp" onclick="waGuru(\''+t.wa+'\',\''+encodeURIComponent(t.name||t.guru)+'\',\''+encodeURIComponent(ctx)+'\')">'+icon('wa',17)+'</button>'; }
function koorSlotRow(s){
  const st=slotStatus(s); const t=ST.teachers.find(x=>x.id===s.guruId)||{wa:'',name:s.guru};
  let right='';
  if(st.k==='confirmed') right='<span class="badge done" title="Waktu konfirmasi">✓ '+st.at+'</span>';
  else if(st.k==='late') right='<div style="display:flex;gap:7px">'+lateBtns(t, s.subj+' '+s.kelas+' jam '+s.start)+'</div>';
  else right='<span class="badge gray">'+(st.k==='ongoing'?'Berlangsung':'Akan datang')+'</span>';
  const conf=(st.k==='confirmed')?'<div style="font-size:10.5px;color:var(--green-tx);margin-top:2px">Dikonfirmasi pukul '+st.at+'</div>':'';
  return '<div class="slot'+(st.k==='late'?' late':'')+'"><div class="time">'+s.start+'</div><div class="divider"></div><div class="body">'
    +'<div class="subj">'+esc(s.subj)+'</div><div class="meta">'+esc(s.guru)+' · '+esc(s.kelas)+' · '+s.jenjang+'</div>'+conf+'</div>'
    +'<div style="display:flex;align-items:center">'+right+'</div></div>';
}
function waGuru(wa,nameEnc,ctxEnc){
  const name=decodeURIComponent(nameEnc), ctx=decodeURIComponent(ctxEnc);
  const msg=encodeURIComponent('Assalamualaikum '+name+', mohon konfirmasi kehadiran untuk jadwal '+ctx+'. Terima kasih 🙏');
  window.open('https://wa.me/'+wa+'?text='+msg,'_blank');
}

/* ================= PEMANTAUAN KELAS (koor) ================= */
function scMonitor(){
  if(!can.monitor()) return '<div class="locked"><div class="em">🔒</div><div class="t">Akses Terbatas</div><div class="d">Pemantauan kelas hanya untuk Koordinator & Owner.</div></div>';
  let slots=todaySlots(); if(F.mon!=='all') slots=slots.filter(s=>s.jenjang===F.mon);
  // group by kelas
  const byKelas={}; slots.forEach(s=>{ (byKelas[s.kelas]=byKelas[s.kelas]||[]).push(s); });
  let h=h_hint('Status realtime tiap kelas. Kelas dengan guru <b>telat konfirmasi >5 menit</b> ditandai merah — ketuk tombol WhatsApp untuk menghubungi.','eye');
  h+=h_chips([['all','Semua'],['SD','SD'],['SMP','SMP'],['SMA','SMA']],F.mon,'setMon');
  const keys=Object.keys(byKelas).sort();
  if(!keys.length) return h+'<div class="empty">Tidak ada jadwal.</div>';
  h+=keys.map(k=>{
    const arr=byKelas[k].sort((a,b)=>timeToMin(a.start)-timeToMin(b.start));
    const anyLate=arr.some(s=>slotStatus(s).k==='late');
    const now=arr.find(s=>{const st=slotStatus(s).k;return st==='ongoing'||st==='late';});
    let rows=arr.map(s=>{ const st=slotStatus(s); const t=ST.teachers.find(x=>x.id===s.guruId)||{wa:''};
      let tag = st.k==='confirmed'?'<span class="badge done">Hadir '+st.at+'</span>':st.k==='late'?'<span class="badge late">Telat</span>':st.k==='ongoing'?'<span class="badge todo">Berlangsung</span>':'<span class="badge gray">'+s.start+'</span>';
      let wa = st.k==='late'?' <button class="mini-btn" style="width:28px;height:28px;background:var(--green-tx);color:#fff" title="Telepon" onclick="telGuru(\''+t.wa+'\')">'+icon('bell',13)+'</button> <button class="mini-btn wa" style="width:28px;height:28px" onclick="waGuru(\''+t.wa+'\',\''+encodeURIComponent(s.guru)+'\',\''+encodeURIComponent(s.subj+' '+k+' jam '+s.start)+'\')">'+icon('wa',13)+'</button>':'';
      return '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--line)"><span style="font-size:11.5px;font-weight:700;color:var(--blue-tx);min-width:42px">'+s.start+'</span><span style="flex:1;font-size:12.5px"><b>'+esc(s.subj)+'</b> · '+esc(s.guru)+'</span>'+tag+wa+'</div>';
    }).join('');
    return '<div class="card" style="'+(anyLate?'border-color:var(--red-solid)':'')+'"><div style="display:flex;align-items:center;gap:8px"><div style="font-size:15px;font-weight:800">'+esc(k)+'</div><span class="pill lvl">'+arr[0].jenjang+'</span>'+(now?'<span class="badge info" style="margin-left:auto">Sesi: '+esc(now.subj)+'</span>':'<span class="badge gray" style="margin-left:auto">Selesai/menunggu</span>')+'</div>'+rows+'</div>';
  }).join('');
  return h;
}

/* ================= JADWAL ================= */
let calY=2026, calM=6, selIso=TODAYISO;
const KALDIK=[['2026-07-07','Rapat','Rakor Harian'],['2026-07-09','Rapat','Evaluasi Bulanan'],['2026-07-11','Observasi','Observasi guru'],['2026-07-15','Soal','Batas soal ujian'],['2026-07-20','Rapor','Bagi rapor'],['2026-07-23','Ujian','Remedial']];
const EVC={Rapat:'var(--blue-700)',Observasi:'var(--amber-solid)',Soal:'var(--green-tx)',Rapor:'var(--blue-500)',Ujian:'var(--red-tx)'};
function scJadwal(){
  let h='';
  if(can.koor()) h+='<button class="btn ghost sm" style="margin-bottom:14px" onclick="formSchedule()">'+icon('plus',18)+'Tambah / atur jadwal per kelas</button>';
  // calendar
  const first=new Date(calY,calM,1), startDow=first.getDay(), dim=new Date(calY,calM+1,0).getDate();
  const iso=d=>calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  let cells='';
  ['A','S','S','R','K','J','S'].forEach(d=>cells+='<div class="dow">'+d+'</div>');
  for(let i=0;i<startDow;i++) cells+='<div></div>';
  for(let d=1;d<=dim;d++){ const ev=KALDIK.filter(k=>k[0]===iso(d)); const sel=iso(d)===selIso, today=iso(d)===TODAYISO;
    cells+='<div class="cell'+(sel?' sel':'')+(today&&!sel?' today':'')+'" onclick="selDay(\''+iso(d)+'\')">'+d+(ev.length?'<span class="ev" style="background:'+(sel?'#fff':EVC[ev[0][1]]||'var(--hint)')+'"></span>':'')+'</div>'; }
  h+='<div class="card"><div style="display:flex;align-items:center;margin-bottom:10px"><b style="font-size:14px">'+BULAN[calM]+' '+calY+'</b><span style="margin-left:auto;display:flex;gap:6px"><button class="mini-btn chat" style="width:30px;height:30px" onclick="calNav(-1)">'+icon('back',16)+'</button><button class="mini-btn chat" style="width:30px;height:30px" onclick="calNav(1)">'+icon('chevron',16)+'</button></span></div><div class="cal">'+cells+'</div></div>';
  // agenda selected
  const evs=KALDIK.filter(k=>k[0]===selIso);
  h+='<div class="card"><div style="font-size:13px;font-weight:700;color:var(--blue-700);margin-bottom:8px">'+fmtDate(selIso)+'</div>';
  h+= evs.length? evs.map(e=>'<div style="display:flex;align-items:center;gap:8px;padding:5px 0"><span style="width:8px;height:8px;border-radius:50%;background:'+(EVC[e[1]]||'var(--hint)')+'"></span><span style="font-size:13px">'+esc(e[2])+'</span><span class="pill lvl" style="margin-left:auto">'+e[1]+'</span></div>').join('') : '<div style="font-size:12.5px;color:var(--hint)">Tidak ada agenda kaldik.</div>';
  h+='</div>';
  // jadwal per hari
  const selDayName=HARI[new Date(selIso+'T00:00:00').getDay()];
  h+=h_sec('Jadwal pelajaran · '+selDayName);
  h+=h_chips([['all','Semua'],['SD','SD'],['SMP','SMP'],['SMA','SMA']],F.sj,'setSj');
  let sched=ST.schedule.filter(s=>s.day===selDayName && (F.sj==='all'||s.jenjang===F.sj)).sort((a,b)=>timeToMin(a.start)-timeToMin(b.start));
  h+= sched.length? sched.map(s=>slotCard(s)).join('') : '<div class="empty">Tidak ada jadwal.</div>';
  return h;
}
function selDay(iso){ selIso=iso; render(); }
function calNav(d){ calM+=d; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;} render(); }
function formSchedule(){
  openModal('Atur jadwal per kelas',
    '<div class="field"><label>Kelas</label><input id="sf_kelas" list="dlKelas" placeholder="mis. Kelas 7A"></div>'
    +'<div class="field"><label>Hari</label><input id="sf_day" list="dlDay" value="'+TODAY_DAY+'"></div>'
    +'<div class="desk-row"><div class="field"><label>Jam mulai</label><input id="sf_start" placeholder="07.30"></div><div class="field"><label>Jam selesai</label><input id="sf_end" placeholder="08.15"></div></div>'
    +'<div class="field"><label>Mapel</label><input id="sf_mapel" list="dlMapel"></div>'
    +'<div class="field"><label>Guru pengampu</label><input id="sf_guru" list="dlGuru"></div>'

function saveSchedule(){

  const kelas=g('sf_kelas'); if(!kelas){ showToast('Kelas wajib'); return; }

<script>
/* ================= DATA & REKAP ================= */
function scData(){
  // 4 kartu: Kehadiran Guru %, Kehadiran Santri %, Kapasitas Kelas, Aktivitas Bulan Ini
  const totalGuru=ST.teachers.length;
  const hadirGuru=ST.schedule.filter(s=>ST.attend[s.id]&&ST.attend[s.id].status==='confirmed').length;
  const totalSlot=ST.schedule.length;
  const pctGuruHadir=totalSlot?Math.round(hadirGuru/totalSlot*100):0;
  
  const totalSantri=ST.santri.length;

const CHAT_CATS=[['semua','Semua'],['manajemen','Manajemen & Staff'],['akademik','Guru Mapel Akademik'],['guru','Guru']];
function allChats(){
  // gabungan channels + directs, urut by last msg

function chatVisibleFor(c){
  // guru hanya lihat: grup mapel-nya, broadcast akademik, grup semua guru, dm koor/owner, dm dirinya
  if(ROLE!=='guru') return true;

function scChat(){
  let h='<div class="seg">'+CHAT_CATS.map(([k,l])=>'<button class="'+(CHAT_CAT===k?'on':'')+'" onclick="setChatCat(\''+k+'\')">'+l+'</button>').join('')+'</div>';

function scNotifikasi(){

  let h='';
  h+=h_hint('Tandai <b>dibaca</b> agar badge sepi, atau <b>selesai</b> untuk menyingkirkan dari daftar.','bell');

function notifCard(n){
  const cls='notif-item'+(!n.read&&!n.done?' unread':'')+(n.done?' done':'');
  const idq="'"+n.id+"'";
  let acts='';
  if(!n.done){
    acts='<div class="notif-actions">';
    if(!n.read) acts+='<button class="btn ghost sm" onclick="event.stopPropagation();notifRead('+idq+')">'+icon('eye',15)+'Dibaca</button>';
    acts+='<button class="btn green sm" onclick="event.stopPropagation();notifDone('+idq+')">'+icon('check',15)+'Selesai</button>';
    if(n.type==='kelaspenuh' && can.koor()) acts+='<button class="btn sm" onclick="event.stopPropagation();formClass()">'+icon('plus',15)+'Buat kelas</button>';
    acts+='</div>';
  } else acts='<div class="notif-actions"><span class="badge done">'+icon('check',13)+' Selesai</span></div>';
  return '<div class="'+cls+'" style="cursor:pointer" onclick="notifGo('+idq+')">'
    +'<div class="nic" style="background:var(--'+n.color+'-bg);color:var(--'+n.color+'-tx)">'+icon(n.ic,20)+'</div>'
    +'<div style="flex:1;min-width:0"><div class="nt">'+esc(n.title)+'</div><div class="nd">'+esc(n.desc)+'</div><div class="nm">'+esc(n.when)+'</div>'+acts+'</div>'
    +'<span style="color:var(--hint);align-self:center">'+icon('chevron',18)+'</span></div>';
}
function notifGo(id){ const n=ST.notifs.find(x=>x.id==id); if(!n) return; n.read=true; updateNotifDot();
  const t=n.target;
  if(t&&t.sc){ if(t.sc==='raporSantri'&&t.id!=null) curRapor=t.id; go(t.sc); }
  else render();
}

    +statCard(lateN,'Keterlambatan',lateN?'var(--red-tx)':'var(--green-tx)')
    +statCard(refl.length,'Refleksi terisi','var(--blue-tx)')
    +statCard(ST.rapor.filter(r=>r.guruId===t.id&&r.status==='accepted').length,'Rapor disetujui','var(--blue-900)')
    +'</div>';
  h+=h_sec('Administrasi');
  [['Perangkat ajar',true],['Silabus',true],['Refleksi rutin',refl.length>0],['Rapor',ST.rapor.some(r=>r.guruId===t.id&&r.status==='accepted')]].forEach(([k,ok])=>{
    h+='<div class="rowitem"><div class="av" style="background:var(--'+(ok?'green':'amber')+'-bg);color:var(--'+(ok?'green':'amber')+'-tx)">'+icon(ok?'check':'clock',18)+'</div><div class="grow"><div class="nm">'+k+'</div></div><span class="badge '+(ok?'done':'todo')+'">'+(ok?'Lengkap':'Belum')+'</span></div>'; });
  h+=h_sec('Refleksi terakhir','Semua','go(\'refleksi\')');
  h+= lastRefl? '<div class="card" style="cursor:pointer" onclick="openDetail('+lastRefl.id+')"><div style="font-size:12px;color:var(--muted)">'+esc(lastRefl.date)+' · '+esc(lastRefl.kelas)+'</div><div style="font-size:13px;margin-top:6px">'+esc(lastRefl.hasil)+'</div></div>' : '<div class="empty">Belum ada refleksi.</div>';
  h+='<div style="height:12px"></div><button class="btn wa" onclick="waGuru(\''+t.wa+'\',\''+encodeURIComponent(t.name)+'\',\''+encodeURIComponent('koordinasi performa')+'\')">'+icon('wa',17)+'Hubungi via WhatsApp</button>';
  return h;
}

const CAL_TYPES={Ujian:'red',Project:'blue',Observasi:'amber',Rapat:'blue',Workshop:'green',Libur:'gray',Deadline:'red'};
let calEvents=[
  {date:'2026-07-07',type:'Rapat',t:'Rakor Harian'},{date:'2026-07-09',type:'Rapat',t:'Evaluasi Bulanan'},
  {date:'2026-07-11',type:'Observasi',t:'Observasi guru'},{date:'2026-07-15',type:'Deadline',t:'Batas soal ujian'},
  {date:'2026-07-20',type:'Deadline',t:'Setoran rapor'},{date:'2026-07-23',type:'Ujian',t:'Remedial'},
  {date:'2026-07-28',type:'Workshop',t:'Workshop kurikulum'},{date:'2026-07-30',type:'Libur',t:'Libur semester'},
];
function scKalender(){
  let h='';

  h+='<div class="chips">'+Object.keys(CAL_TYPES).map(k=>'<span class="chip" style="pointer-events:none"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--'+CAL_TYPES[k]+'-solid,var(--hint));margin-right:6px"></span>'+k+'</span>').join('')+'</div>';
  // upcoming list grouped
  const sorted=[...calEvents].sort((a,b)=>a.date.localeCompare(b.date));

function formCalEvent(){

}
function saveCalEvent(){ const t=document.getElementById('ce_t').value.trim(); if(!t){showToast('Judul wajib');return;} calEvents.push({date:document.getElementById('ce_d').value,type:document.getElementById('ce_type').value,t}); logAct('calendar','blue','Agenda "'+t+'" ditambahkan ke kalender'); closeModal(); showToast('Agenda ditambahkan ✓'); render(); }

/* ---------- BANK SOAL ---------- */
let bsLevel=null,bsKelas=null,bsMapel=null;
function bsReset(){bsLevel=null;bsKelas=null;bsMapel=null;render();}
function scBankSoal(){
  let h='';
  if(can.koor()) h+='<button class="btn ghost sm" style="margin-bottom:12px" onclick="formSoal()">'+icon('plus',18)+'Tambah soal</button>';
  // clickable breadcrumb via ids
  h+='<div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;font-size:12.5px;margin-bottom:12px">'
    +'<span style="color:var(--blue-tx);font-weight:700;cursor:pointer" onclick="bsReset()">Bank Soal</span>'
    +(bsLevel?'<span style="color:var(--hint)">/</span><span style="color:'+(bsKelas?'var(--blue-tx)':'var(--muted)')+';font-weight:'+(bsKelas?'700':'400')+';cursor:pointer" onclick="bsKelas=null;bsMapel=null;render()">'+esc(bsLevel)+'</span>':'')
    +(bsKelas?'<span style="color:var(--hint)">/</span><span style="color:'+(bsMapel?'var(--blue-tx)':'var(--muted)')+';font-weight:'+(bsMapel?'700':'400')+';cursor:pointer" onclick="bsMapel=null;render()">'+esc(bsKelas)+'</span>':'')
    +(bsMapel?'<span style="color:var(--hint)">/</span><span style="color:var(--muted)">'+esc(bsMapel)+'</span>':'')
    +'</div>';
  if(!bsLevel){
    h+=h_hint('Telusuri soal: pilih jenjang → kelas → mapel.','soal');
    ['SD','SMP','SMA'].forEach(j=>{ const n=ST.bankSoal.filter(s=>s.jenjang===j).length;
      h+='<div class="rowitem" style="cursor:pointer" onclick="bsLevel=\''+j+'\';render()"><div class="av">'+icon('school',20)+'</div><div class="grow"><div class="nm">Jenjang '+j+'</div><div class="sub">'+n+' soal</div></div><span style="color:var(--hint)">'+icon('chevron',18)+'</span></div>'; });
    return h;
  }
  if(!bsKelas){
    const kelasList=[...new Set(ST.bankSoal.filter(s=>s.jenjang===bsLevel).map(s=>s.kelas))];
    kelasList.forEach(k=>{ const n=ST.bankSoal.filter(s=>s.jenjang===bsLevel&&s.kelas===k).length;
      h+='<div class="rowitem" style="cursor:pointer" onclick="bsKelas=\''+k+'\';render()"><div class="av">'+icon('grid',20)+'</div><div class="grow"><div class="nm">'+esc(k)+'</div><div class="sub">'+n+' soal</div></div><span style="color:var(--hint)">'+icon('chevron',18)+'</span></div>'; });
    return h;
  }
  if(!bsMapel){
    const mapelList=[...new Set(ST.bankSoal.filter(s=>s.jenjang===bsLevel&&s.kelas===bsKelas).map(s=>s.subj))];
    mapelList.forEach(m=>{ const n=ST.bankSoal.filter(s=>s.jenjang===bsLevel&&s.kelas===bsKelas&&s.subj===m).length;
      h+='<div class="rowitem" style="cursor:pointer" onclick="bsMapel=\''+m.replace(/'/g,"")+'\';render()"><div class="av" style="background:var(--blue-50);color:var(--blue-tx)">'+icon('grade',20)+'</div><div class="grow"><div class="nm">'+esc(m)+'</div><div class="sub">'+n+' soal</div></div><span style="color:var(--hint)">'+icon('chevron',18)+'</span></div>'; });
    return h;
  }
  // soal list
  const list=ST.bankSoal.filter(s=>s.jenjang===bsLevel&&s.kelas===bsKelas&&s.subj===bsMapel);
  h+='<div style="font-size:12px;color:var(--hint);margin-bottom:8px">'+list.length+' soal · '+esc(bsLevel)+' '+esc(bsKelas)+' · '+esc(bsMapel)+'</div>';
  if(!list.length) return h+'<div class="empty">Belum ada soal. Tambahkan lewat tombol di atas.</div>';
  h+=list.map(s=>{ const lc=s.level==='Sulit'?'late':s.level==='Sedang'?'todo':'done';
    return '<div class="card"><div style="font-size:13.5px;line-height:1.5;margin-bottom:8px">'+esc(s.q)+'</div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center"><span class="pill lvl">'+esc(s.sem)+'</span><span class="pill lvl">'+esc(s.tipe)+'</span><span class="badge '+lc+'">'+esc(s.level)+'</span>'
      +(can.koor()?'<button class="mini-btn chat" style="width:32px;height:32px;margin-left:auto" title="Duplikat" onclick="dupSoal('+s.id+')">'+icon('copy',16)+'</button>':'')+'</div></div>';
  }).join('');
  return h;
}
function setSoalFilter(c){ soalFilter=c; render(); }
let soalFilter='Semua';
function dupSoal(id){ const s=ST.bankSoal.find(x=>x.id===id); ST.bankSoal.unshift(Object.assign({},s,{id:ST.soalSeq++})); showToast('Soal diduplikasi ✓'); render(); }
function formSoal(){
  openModal('Tambah soal',
    '<div class="field"><label>Pertanyaan</label><textarea id="sl_q"></textarea></div>'

    +'<div class="desk-row"><div class="field"><label>Tipe</label><select id="sl_tipe"><option>Isian</option><option>Esai</option><option>Pilihan Ganda</option></select></div><div class="field"><label>Level</label><select id="sl_level"><option>Mudah</option><option>Sedang</option><option>Sulit</option></select></div></div>'

function saveSoal(){ const q=document.getElementById('sl_q').value.trim(); if(!q){showToast('Pertanyaan wajib');return;}
  ST.bankSoal.unshift({id:ST.soalSeq++, q, subj:document.getElementById('sl_subj').value||'Matematika', kelas:document.getElementById('sl_kelas').value||'Kelas 7', sem:document.getElementById('sl_sem').value, tipe:document.getElementById('sl_tipe').value, level:document.getElementById('sl_level').value});
  logAct('soal','blue','Soal baru ditambahkan ke Bank Soal'); closeModal(); showToast('Soal ditambahkan ✓'); render(); }

/* ---------- TO-DO ---------- */
function scTodo(){
  if(!can.edit()) return '<div class="locked"><div class="em">🔒</div><div class="t">Akses Terbatas</div><div class="d">To-Do untuk Koordinator/Owner.</div></div>';
  let h='';
  h+='<button class="btn ghost sm" style="margin-bottom:14px" onclick="formTodo()">'+icon('plus',18)+'Tambah tugas</button>';
  const active=ST.todos.filter(t=>!t.done), done=ST.todos.filter(t=>t.done);
  h+=h_sec('Aktif ('+active.length+')');
  h+= active.length? active.map(todoCard).join('') : '<div class="empty">Tidak ada tugas aktif.</div>';
  if(done.length){ h+=h_sec('Selesai ('+done.length+')'); h+=done.map(todoCard).join(''); }
  return h;
}
function todoCard(t){ const p=PRIO[t.prio]||['gray',t.prio];
  const chk=t.checklist&&t.checklist.length?('<div style="margin-top:9px">'+t.checklist.map((c,i)=>'<div style="display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer" onclick="toggleChk('+t.id+','+i+')"><span style="width:19px;height:19px;border-radius:6px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;'+(c[1]?'background:var(--blue-700);border-color:var(--blue-700);color:#fff':'')+'">'+(c[1]?icon('check',12):'')+'</span><span style="font-size:12.5px;'+(c[1]?'text-decoration:line-through;color:var(--hint)':'')+'">'+esc(c[0])+'</span></div>').join('')+'</div>'):'';
  return '<div class="card"'+(t.done?' style="opacity:.65"':'')+'><div style="display:flex;align-items:flex-start;gap:10px">'
    +'<span onclick="toggleTodo('+t.id+')" style="width:22px;height:22px;border-radius:7px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;'+(t.done?'background:var(--green-tx);border-color:var(--green-tx);color:#fff':'')+'">'+(t.done?icon('check',13):'')+'</span>'
    +'<div style="flex:1"><div style="font-size:14px;font-weight:700;'+(t.done?'text-decoration:line-through':'')+'">'+esc(t.t)+'</div>'
    +'<div style="display:flex;gap:6px;margin-top:6px;align-items:center"><span class="badge '+(p[0]==='red'?'late':p[0]==='amber'?'todo':'gray')+'">'+icon('flag',11)+' '+p[1]+'</span><span class="badge gray">'+icon('clock',11)+' '+esc(t.deadline)+'</span></div>'
    +chk+'</div></div></div>';
}
function toggleTodo(id){ const t=ST.todos.find(x=>x.id===id); t.done=!t.done; if(t.done) logAct('todo','green','Tugas selesai: '+t.t); render(); }
function toggleChk(id,i){ const t=ST.todos.find(x=>x.id===id); t.checklist[i][1]=!t.checklist[i][1]; render(); }
function formTodo(){
  openModal('Tambah tugas',
    '<div class="field"><label>Judul tugas</label><input id="td_t"></div>'
    +'<div class="field"><label>Prioritas</label><select id="td_p"><option>Tinggi</option><option>Sedang</option><option>Rendah</option></select></div>'
    +'<div class="field"><label>Deadline</label><input id="td_d" placeholder="mis. 15 Juli"></div>'
    +'<button class="btn" onclick="saveTodo()">Simpan tugas</button>');
}
function saveTodo(){ const t=document.getElementById('td_t').value.trim(); if(!t){showToast('Judul wajib');return;} ST.todos.unshift({id:ST.todoSeq++,t,prio:document.getElementById('td_p').value,deadline:document.getElementById('td_d').value||'-',done:false,checklist:[]}); closeModal(); showToast('Tugas ditambahkan ✓'); render(); }

/* ---------- GLOBAL SEARCH ---------- */
function scSearch(){
  let h='<div class="field" style="margin-bottom:16px"><input id="searchInput" placeholder="Cari guru, kelas, mapel, dokumen, soal…" oninput="doSearch(this.value)" value="'+esc(searchQ)+'" autofocus></div>';
  const q=searchQ.trim().toLowerCase();
  if(!q) return h+'<div class="empty">Ketik untuk mencari di seluruh HSUQI.</div>';
  let res=[];
  ST.teachers.forEach(t=>{ if((t.name+t.subj+t.jenjang).toLowerCase().includes(q)) res.push(['users','Guru',t.name,t.subj+' · '+t.jenjang,'openPerf('+t.id+')']); });
  ST.classes.forEach(c=>{ if((c.kelas+c.jenjang).toLowerCase().includes(q)) res.push(['school','Kelas',c.kelas,c.jenjang+' · '+c.santri+' santri','go(\'komposisi\')']); });
  SUBJECTS.forEach(s=>{ if(s.toLowerCase().includes(q)) res.push(['grade','Mapel',s,'Mata pelajaran','openMapel(\''+s+'\')']); });
  ST.documents.forEach(d=>{ if(d.name.toLowerCase().includes(q)) res.push(['doc2','Dokumen',d.name,d.cat+' · '+d.size,'go(\'dokumen\')']); });
  ST.bankSoal.forEach(s=>{ if(s.q.toLowerCase().includes(q)) res.push(['soal','Soal',s.q.slice(0,50)+'…',s.subj+' · '+s.kelas,'go(\'banksoal\')']); });
  ST.activity.forEach(a=>{ if(a.text.toLowerCase().includes(q)) res.push(['activity','Aktivitas',a.text,a.when,'go(\'aktivitas\')']); });
  if(!res.length) return h+'<div class="empty">Tidak ditemukan hasil untuk "'+esc(searchQ)+'".</div>';
  h+='<div style="font-size:12px;color:var(--hint);margin-bottom:10px">'+res.length+' hasil</div>';
  h+=res.slice(0,30).map(([ic,cat,title,sub,fn])=>'<div class="rowitem" style="cursor:pointer" onclick="'+fn+'"><div class="av">'+icon(ic,18)+'</div><div class="grow"><div class="nm">'+esc(title)+'</div><div class="sub">'+esc(sub)+'</div></div><span class="badge gray">'+cat+'</span></div>').join('');
  return h;
}
function doSearch(v){ searchQ=v; const c=document.getElementById('content'); const inp=document.getElementById('searchInput'); const pos=inp?inp.selectionStart:null; render(); const ni=document.getElementById('searchInput'); if(ni){ ni.focus(); if(pos!=null) try{ni.setSelectionRange(pos,pos);}catch(e){} } }
</script>
